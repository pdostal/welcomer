<svg width="220" height="200" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope body -->
  <rect x="20" y="70" width="180" height="100" rx="10" ry="10" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Symmetric W-shaped flap perfectly aligned -->
  <path d="
    M20,70
    L65,140
    L110,110
    L155,140
    L200,70
    Z
  " fill="#e0e0e0" stroke="#333" stroke-width="2"/>

  <!-- Inner fold line -->
  <polyline points="20,170 110,110 200,170" fill="none" stroke="#333" stroke-width="2"/>
</svg>
