# Welcomer Configuration
# Copy this file to config.toml and edit to your needs.

title = "Welcome to Our Team!"

# Message template — use {name} and any recipient extra fields
message = """
Hello, **{name}**! We're thrilled to have you with us.
"""

# Optional markdown rendered before the welcome table
header_markdown = """
## New Member Onboarding

Please review the links below and introduce yourself in #general.

- [Team Handbook](https://example.com/handbook)
- [Engineering Docs](https://example.com/docs)
- [Slack Channels](https://example.com/slack)
"""

# Optional markdown footer rendered after the table
footer = """
---
*This message was generated by welcomer. Questions? Reach out to #onboarding.*
"""

# Channels to send to (e.g. slack channels, email lists, etc.)
channels = ["#general", "#onboarding"]

# Recipients list
[[recipients]]
name = "Alice"
tags = ["#general"]          # override channels for this recipient

[[recipients]]
name = "Bob"
role = "engineer"            # extra fields available in message template

[[recipients]]
name = "Carol"
role = "designer"
tags = ["#design", "#general"]
