# Welcomer Configuration
# Copy this file to config.toml and edit to your needs.

subject = "Welcome to Our Team, {name}!"

# Multiline markdown body
# Available variables: {name}, {email}, {start}, {end}, {summary}
body = """
Hi {name},

We're thrilled to have you joining us from **{start}** to **{end}**.

Here's what to do first:

- Say hello in **#general**
- Read the [Team Handbook](https://example.com/handbook)
- Check out the [Engineering Docs](https://example.com/docs)

See you soon!
"""

# iCal calendar URLs
# Recipients (name, email, date period) are loaded from ATTENDEE entries in each calendar's events.
[[calendars]]
name = "Team Onboarding"
url = "https://example.com/calendars/onboarding.ics"

[[calendars]]
name = "New Hires"
url = "https://example.com/calendars/new-hires.ics"
