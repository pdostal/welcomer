# Welcomer Configuration
# Copy this file to config.toml (or ~/.config/welcomer.toml) and edit to your needs.

subject = "Welcome to {property}, {name}!"

# Date format using Python strftime codes. Default: "%Y-%m-%d" (e.g. 2026-05-03)
# Examples: "%-d. %-m. %Y" → "3. 5. 2026"   "%d/%m/%Y" → "03/05/2026"
date_format = "%Y-%m-%d"

# Multiline markdown body
# Available variables: {name}, {email}, {phone}, {start}, {end}, {summary}, {property}, {provider}
body = """
Dear {name},

Thank you for your reservation from **{start}** to **{end}**.

We look forward to welcoming you at **{property}**. If you have any questions
before your arrival, reach us by email at reception@example.com or by phone.

See you soon!
"""

# iCal calendar sources — url can be a URL, an absolute path, or a relative path
# (relative paths are resolved against the directory containing this config file).
[[calendars]]
name = "Main Property"
provider = "ExampleProvider"
url = "https://example.com/calendars/reservations.ics"

