# Welcomer Configuration
# Copy this file to config.toml (or ~/.config/welcomer.toml) and edit to your needs.

subject = "Reservation confirmed – {name}"

# Multiline markdown body
# Available variables: {name}, {email}, {phone}, {start}, {end}, {summary}
body = """
Dear {name},

Thank you for your reservation from **{start}** to **{end}**.

We look forward to welcoming you. If you have any questions before your arrival,
reach us by email at reception@example.com or by phone.

See you soon!
"""

# iCal calendar URLs
# Recipients (name, email, phone, date period) are loaded from calendar events.
[[calendars]]
name = "Reservations"
url = "https://example.com/calendars/reservations.ics"
